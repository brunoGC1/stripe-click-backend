<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Click Challenge</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #1d2b64, #f8cdda);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  background: white;
  padding: 40px;
  border-radius: 20px;
  width: 380px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}

.title {
  margin-bottom: 10px;
}

.stats {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
  font-size: 14px;
  color: #555;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

#clickBtn {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #ff4d4d, #b30000);
  color: white;
  font-size: 18px;
  font-weight: bold;
  border: none;
  margin-top: 20px;
}

#clickBtn:active {
  transform: scale(0.95);
}

#payBtn {
  background: #222;
  color: white;
}

.locked {
  opacity: 0.4;
  cursor: not-allowed;
}
</style>
</head>

<body>

<div class="card">

  <h2 class="title">Click System</h2>

  <div class="stats">
    <div>Clicks: <span id="clicks">0</span></div>
    <div>Credits: <span id="credits">0</span></div>
  </div>

  <button id="clickBtn" class="locked">NO CREDITS</button>
  <button id="payBtn">Buy 1 Credit ($1)</button>

</div>

<script>
const API = "https://stripe-click-backend.onrender.com";

let clicks = 0;
let credits = 0;

/* =========================
   LOAD STATUS
========================= */
async function loadStatus() {
  const res = await fetch(API + "/status");
  const data = await res.json();

  clicks = data.clicks;
  credits = data.credits;

  render();
}

/* =========================
   RENDER
========================= */
function render() {
  document.getElementById("clicks").innerText = clicks;
  document.getElementById("credits").innerText = credits;

  const btn = document.getElementById("clickBtn");

  if (credits > 0) {
    btn.innerText = "CLICK!";
    btn.classList.remove("locked");
  } else {
    btn.innerText = "NO CREDITS";
    btn.classList.add("locked");
  }
}

/* =========================
   CLICK
========================= */
document.getElementById("clickBtn").onclick = async () => {
  const res = await fetch(API + "/click", { method: "POST" });
  const data = await res.json();

  if (!data.ok) return;

  clicks = data.clicks;
  credits = data.credits;

  render();
};

/* =========================
   BUY CREDIT
========================= */
document.getElementById("payBtn").onclick = async () => {
  const res = await fetch(API + "/create-checkout-session", {
    method: "POST"
  });

  const data = await res.json();
  window.location.href = data.url;
};

/* =========================
   CHECK PAYMENT
========================= */
async function checkPayment() {
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get("session_id");

  if (sessionId) {
    await fetch(`${API}/verify-session?session_id=${sessionId}`);
    window.history.replaceState({}, document.title, "/");
  }

  loadStatus();
}

checkPayment();
</script>

</body>
</html>
