<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>$1 Million Click Challenge</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container { text-align: center; }

    h1 { font-size: 48px; margin-bottom: 20px; }

    #counter {
      font-size: 28px;
      margin-bottom: 40px;
      font-weight: bold;
    }

    .button-area {
      display: flex;
      align-items: center;
      gap: 24px;
      justify-content: center;
    }

    .button-box {
      position: relative;
      width: 260px;
      height: 260px;
    }

    #mainBtn {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: none;
      background: radial-gradient(circle at 30% 30%, #ff5c5c, #b30000);
      box-shadow: inset 0 -10px 20px rgba(0,0,0,.35),
                  0 18px 35px rgba(255,0,0,.35);
      color: white;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      position: relative;
      z-index: 1;
    }

    #cover {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(4px);
      border: 2px solid rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 54px;
      z-index: 2;
      transition: transform .5s ease, opacity .5s ease;
      transform-origin: top center;
    }

    #cover.shake {
      animation: shake .22s ease;
    }

    #cover.open {
      transform: rotateX(75deg) translateY(-35px);
      opacity: .15;
      pointer-events: none;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-3px); }
      100% { transform: translateX(0); }
    }

    #mainBtn.reward {
      animation: reward .45s ease;
    }

    @keyframes reward {
      0% { transform: scale(1); }
      30% { transform: scale(.9); }
      60% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    #sideAction {
      font-size: 30px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>$1 Million Click Challenge</h1>
    <p id="counter">0 / 1,000,000 clicks</p>

    <div class="button-area">
      <div class="button-box">
        <button id="mainBtn">CLICK ME</button>
        <div id="cover">🔒</div>
      </div>

      <div id="sideAction">Pay here</div>
    </div>
  </div>

  <script>
    let unlocked = false;
    const counter = document.getElementById('counter');
    const cover = document.getElementById('cover');
    const sideAction = document.getElementById('sideAction');
    const mainBtn = document.getElementById('mainBtn');

    async function loadCounter() {
      const res = await fetch('https://stripe-click-backend.onrender.com/click-count');
      const data = await res.json();
      counter.textContent = `${data.clicks.toLocaleString()} / 1,000,000 clicks`;
    }

    loadCounter();

    const params = new URLSearchParams(window.location.search);
    if (params.get('success') === 'true') {
      unlocked = true;
      cover.classList.add('open');
      sideAction.textContent = 'Now press it';
    }

    mainBtn.addEventListener('click', async () => {
      if (!unlocked) {
        cover.classList.add('shake');
        setTimeout(() => cover.classList.remove('shake'), 220);
        return;
      }

      mainBtn.classList.add('reward');

      const res = await fetch('https://stripe-click-backend.onrender.com/register-click', {
        method: 'POST'
      });

      const data = await res.json();
      counter.textContent = `${data.clicks.toLocaleString()} / 1,000,000 clicks`;

      unlocked = false;
      cover.classList.remove('open');
      sideAction.textContent = 'Pay here';

      setTimeout(() => mainBtn.classList.remove('reward'), 450);
      window.history.replaceState({}, document.title, "/");
    });

    sideAction.addEventListener('click', async () => {
      if (unlocked) return;

      const response = await fetch('https://stripe-click-backend.onrender.com/create-checkout-session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({})
      });

      const data = await response.json();
      window.location.href = data.url;
    });
  </script>
</body>
</html>
