<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Click Game</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 300px;
    }

    h1 {
      margin-bottom: 10px;
    }

    #counter {
      font-size: 40px;
      margin: 20px 0;
    }

    .btn {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: none;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.1s;
    }

    .locked {
      background: #333;
      color: white;
    }

    .unlocked {
      background: #e53935;
      color: white;
      box-shadow: 0 10px 20px rgba(229,57,53,0.4);
    }

    .btn:active {
      transform: scale(0.95);
    }

    .small {
      margin-top: 15px;
      font-size: 14px;
      color: #666;
    }

    .payBtn {
      margin-top: 20px;
      padding: 10px 20px;
      background: #111;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Click Game</h1>

  <div id="counter">0</div>

  <button id="clickBtn" class="btn locked">🔒 LOCKED</button>

  <div class="small" id="creditsText">Credits: 0</div>

  <button class="payBtn" id="payBtn">Pay here</button>
</div>

<script>
const API = "https://stripe-click-backend.onrender.com";

let clicks = 0;
let credits = 0;

const clickBtn = document.getElementById("clickBtn");
const counter = document.getElementById("counter");
const creditsText = document.getElementById("creditsText");
const payBtn = document.getElementById("payBtn");

// =========================
// RENDER UI
// =========================
function render() {
  counter.innerText = clicks;
  creditsText.innerText = "Credits: " + credits;

  if (credits > 0) {
    clickBtn.className = "btn unlocked";
    clickBtn.innerText = "CLICK";
  } else {
    clickBtn.className = "btn locked";
    clickBtn.innerText = "🔒 LOCKED";
  }
}

// =========================
// STATUS
// =========================
async function refreshStatus() {
  try {
    const res = await fetch(API + "/status");
    const data = await res.json();

    clicks = data.clicks;
    credits = data.credits;

    render();
  } catch (e) {
    console.log("status error", e);
  }
}

// =========================
// CLICK
// =========================
clickBtn.onclick = async () => {
  if (credits <= 0) return;

  try {
    const res = await fetch(API + "/click", {
      method: "POST"
    });

    const data = await res.json();

    clicks = data.clicks;
    credits = data.credits;

    render();
  } catch (e) {
    console.log("click error", e);
  }
};

// =========================
// STRIPE PAY
// =========================
payBtn.onclick = async () => {
  try {
    const res = await fetch(API + "/create-checkout-session", {
      method: "POST"
    });

    const data = await res.json();

    if (data.url) {
      window.location.href = data.url;
    } else {
      alert("Stripe error");
    }

  } catch (e) {
    console.log("pay error", e);
    alert("Failed to connect to server");
  }
};

// =========================
// RETURN FROM STRIPE
// =========================
const params = new URLSearchParams(window.location.search);

if (params.get("success") === "true") {
  refreshStatus();
  window.history.replaceState({}, document.title, "/index.html");
}

// init
refreshStatus();

</script>

</body>
</html>
