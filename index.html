<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Click Box</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at top, #2b2b3a, #0d0d12);
  color: white;
}

/* =========================
   CONTAINER (GLASS BOX)
========================= */
.container {
  width: 360px;
  height: 420px;
  border-radius: 25px;
  position: relative;

  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(12px);

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  overflow: hidden;
  transition: 0.6s ease;
}

/* =========================
   OVERLAY LOCK
========================= */
.lockOverlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.65);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 10px;

  transition: 0.6s ease;
  z-index: 1;
}

.lockIcon {
  font-size: 40px;
}

.lockText {
  font-size: 14px;
  opacity: 0.8;
}

/* unlock animation */
.unlocked .lockOverlay {
  transform: translateY(-100%);
  opacity: 0;
}

/* IMPORTANT: não bloquear clicks quando desbloqueado */
.unlocked .lockOverlay {
  pointer-events: none;
}

/* =========================
   3D BUTTON (COGUMELO STYLE)
========================= */
#clickBtn {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  border: none;

  background: radial-gradient(circle at 30% 30%, #ff5c5c, #a80000);
  box-shadow:
    0 12px 0 #5a0000,
    0 18px 25px rgba(0,0,0,0.4);

  color: white;
  font-size: 18px;
  font-weight: bold;

  transform: translateY(0);
  transition: 0.15s ease;

  cursor: not-allowed;
  z-index: 2;
}

#clickBtn:active {
  transform: translateY(6px);
  box-shadow:
    0 6px 0 #5a0000,
    0 10px 15px rgba(0,0,0,0.3);
}

.unlocked #clickBtn {
  cursor: pointer;
}

/* =========================
   PAY BUTTON (IMPORTANT FIX)
========================= */
#payBtn {
  margin-top: 20px;
  padding: 10px 18px;
  border: none;
  border-radius: 10px;

  background: #111;
  color: white;

  cursor: pointer;

  position: relative;
  z-index: 5; /* 🔥 garante clique acima de tudo */
}

/* =========================
   TEXT
========================= */
h1 {
  margin-bottom: 10px;
}

.stats {
  margin-top: 15px;
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div id="box" class="container">

  <div class="lockOverlay">
    <div class="lockIcon">🔒</div>
    <div class="lockText">Pay $1 to open the box</div>
  </div>

  <h1>Click Box</h1>

  <button id="clickBtn">LOCKED</button>

  <div class="stats">
    Clicks: <span id="clicks">0</span> |
    Credits: <span id="credits">0</span>
  </div>

  <button id="payBtn">Pay here ($1)</button>

</div>

<script>
const API = "https://stripe-click-backend.onrender.com";

let clicks = 0;
let credits = 0;

/* =========================
   LOAD STATUS
========================= */
async function load() {
  const res = await fetch(API + "/status");
  const data = await res.json();

  clicks = data.clicks;
  credits = data.credits;

  render();
}

/* =========================
   RENDER UI
========================= */
function render() {
  document.getElementById("clicks").innerText = clicks;
  document.getElementById("credits").innerText = credits;

  const box = document.getElementById("box");
  const btn = document.getElementById("clickBtn");

  if (credits > 0) {
    box.classList.add("unlocked");
    btn.innerText = "CLICK!";
  } else {
    box.classList.remove("unlocked");
    btn.innerText = "LOCKED";
  }
}

/* =========================
   CLICK (SAFE)
========================= */
document.getElementById("clickBtn").onclick = async () => {
  if (credits <= 0) return;

  const res = await fetch(API + "/click", {
    method: "POST"
  });

  const data = await res.json();

  if (!data.ok) return;

  clicks = data.clicks;
  credits = data.credits;

  render();
};

/* =========================
   PAY (FIXED + GUARANTEED)
========================= */
document.getElementById("payBtn").onclick = async () => {
  console.log("PAY CLICKED");

  try {
    const res = await fetch(API + "/create-checkout-session", {
      method: "POST"
    });

    console.log("STATUS:", res.status);

    const data = await res.json();
    console.log("DATA:", data);

    if (data.url) {
      window.location.href = data.url;
    } else {
      alert("Stripe URL missing");
    }

  } catch (e) {
    console.log("ERROR:", e);
    alert("Failed to reach backend");
  }
};

/* =========================
   CHECK PAYMENT RETURN
========================= */
async function checkPayment() {
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get("session_id");

  if (sessionId) {
    await fetch(`${API}/verify-session?session_id=${sessionId}`);
    window.history.replaceState({}, document.title, "/");
  }

  load();
}

checkPayment();
</script>

</body>
</html>
