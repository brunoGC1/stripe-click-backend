<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Click Challenge</title>

<style>
body {
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
  padding-top:100px;
}

#clickButton {
  width:240px;
  height:240px;
  border-radius:50%;
  border:none;
  font-size:18px;
  transition:0.2s;
}

.locked {
  background:#222;
  cursor:not-allowed;
}

.unlocked {
  background:red;
  cursor:pointer;
}

#lockIcon {
  font-size:30px;
}

#counter {
  font-size:40px;
  margin-top:40px;
}
</style>
</head>

<body>

<h1>Click Challenge</h1>

<button id="clickButton" class="locked">
  <div id="lockIcon">🔒</div>
  <div id="text">Pay $1 to unlock</div>
</button>

<div id="counter">0</div>

<script>
const API = "https://stripe-click-backend.onrender.com";

const button = document.getElementById("clickButton");
const lockIcon = document.getElementById("lockIcon");
const text = document.getElementById("text");
const counter = document.getElementById("counter");

// estado único
let unlocked = localStorage.getItem("unlocked") === "true";

// Stripe retorno
const params = new URLSearchParams(window.location.search);
if (params.get("success") === "true") {
  unlocked = true;
  localStorage.setItem("unlocked","true");
  window.history.replaceState({}, document.title, "/");
}

// render único
function render(){
  if(unlocked){
    button.classList.remove("locked");
    button.classList.add("unlocked");
    lockIcon.style.display="none";
    text.innerText="Click now!";
  }
}
render();

// load counter
fetch(API+"/click-count")
.then(r=>r.json())
.then(d=>counter.innerText=d.clicks);

// click
button.onclick = async () => {
  if(!unlocked){
    const res = await fetch(API+"/create-checkout-session",{method:"POST"});
    const data = await res.json();
    window.location.href = data.url;
    return;
  }

  const res = await fetch(API+"/register-click",{method:"POST"});
  const data = await res.json();
  counter.innerText = data.clicks;
};
</script>

</body>
</html>
