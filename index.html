<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Click Box</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;

  font-family: Arial;
  background: radial-gradient(circle at top, #3a3f55, #161823);
  color: white;
}

/* =========================
   CONTAINER 3D
========================= */
.container {
  width: 380px;
  height: 450px;
  border-radius: 28px;

  position: relative;

  background: linear-gradient(145deg, #2a2f3d, #1a1e2a);
  box-shadow:
    0 20px 40px rgba(0,0,0,0.5),
    inset 0 2px 6px rgba(255,255,255,0.05);

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  overflow: hidden;
  transition: transform 0.6s ease;
}

/* =========================
   LOCK OVERLAY
========================= */
.lockOverlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 10px;

  z-index: 2;
  transition: 1.2s ease;
}

.lockIcon {
  font-size: 40px;
}

.lockText {
  font-size: 14px;
  opacity: 0.8;
}

/* unlock suave */
.unlocked .lockOverlay {
  transform: scale(1.05) translateY(-120%);
  opacity: 0;
  pointer-events: none;
}

/* =========================
   BUTTON 3D
========================= */
#clickBtn {
  width: 190px;
  height: 190px;
  border-radius: 50%;
  border: none;

  background: radial-gradient(circle at 30% 30%, #ff4b4b, #8b0000);

  box-shadow:
    0 14px 0 #4a0000,
    0 22px 30px rgba(0,0,0,0.45);

  color: white;
  font-size: 18px;
  font-weight: bold;

  cursor: not-allowed;
  transition: 0.12s ease;
  z-index: 3;
}

#clickBtn:active {
  transform: translateY(6px);
  box-shadow:
    0 6px 0 #4a0000,
    0 12px 18px rgba(0,0,0,0.35);
}

.unlocked #clickBtn {
  cursor: pointer;
}

/* =========================
   PAY BUTTON
========================= */
#payBtn {
  margin-top: 18px;
  padding: 10px 18px;

  border: none;
  border-radius: 10px;

  background: #111;
  color: white;

  cursor: pointer;
  z-index: 3;
}

/* =========================
   TEXT
========================= */
h1 {
  margin-bottom: 10px;
}

.stats {
  margin-top: 15px;
  font-size: 14px;
  opacity: 0.8;
}

/* shake animation */
@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  50% { transform: translateX(4px); }
  75% { transform: translateX(-3px); }
  100% { transform: translateX(0); }
}

.shake {
  animation: shake 0.12s;
}
</style>
</head>

<body>

<div id="box" class="container">

  <div class="lockOverlay">
    <div class="lockIcon">🔒</div>
    <div class="lockText">Pay $1 to unlock the box</div>
  </div>

  <h1>Click Box</h1>

  <button id="clickBtn">LOCKED</button>

  <div class="stats">
    Clicks: <span id="clicks">0</span> |
    Credits: <span id="credits">0</span>
  </div>

  <button id="payBtn">Pay here ($1)</button>

</div>

<script>
const API = "https://stripe-click-backend.onrender.com";

let clicks = 0;
let credits = 0;

/* =========================
   AUDIO (100% STABLE FIX)
========================= */
function playLockSound() {
  const a = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
  a.volume = 0.7;
  a.play().catch(() => {});
}

function playClickSound() {
  const a = new Audio("https://actions.google.com/sounds/v1/impacts/heavy_impact_1.ogg");
  a.volume = 0.8;
  a.play().catch(() => {});
}

/* =========================
   LOAD
========================= */
async function load() {
  const res = await fetch(API + "/status");
  const data = await res.json();

  clicks = data.clicks;
  credits = data.credits;

  render();
}

/* =========================
   RENDER
========================= */
function render() {
  document.getElementById("clicks").innerText = clicks;
  document.getElementById("credits").innerText = credits;

  const box = document.getElementById("box");
  const btn = document.getElementById("clickBtn");

  if (credits > 0) {
    box.classList.add("unlocked");
    btn.innerText = "CLICK!";
  } else {
    box.classList.remove("unlocked");
    btn.innerText = "LOCKED";
  }
}

/* =========================
   CLICK LOGIC
========================= */
document.getElementById("clickBtn").onclick = async () => {

  if (credits <= 0) {
    playLockSound();

    const box = document.getElementById("box");
    box.classList.add("shake");

    setTimeout(() => box.classList.remove("shake"), 120);

    return;
  }

  const res = await fetch(API + "/click", {
    method: "POST"
  });

  const data = await res.json();

  if (!data.ok) {
    playLockSound();
    return;
  }

  playClickSound();

  clicks = data.clicks;
  credits = data.credits;

  render();
};

/* =========================
   PAY
========================= */
document.getElementById("payBtn").onclick = async () => {
  const res = await fetch(API + "/create-checkout-session", {
    method: "POST"
  });

  const data = await res.json();

  window.location.href = data.url;
};

/* =========================
   CHECK PAYMENT RETURN
========================= */
async function checkPayment() {
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get("session_id");

  if (sessionId) {
    await fetch(`${API}/verify-session?session_id=${sessionId}`);
    window.history.replaceState({}, document.title, "/");
  }

  load();
}

checkPayment();
</script>

</body>
</html>
