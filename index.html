<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Curiosity Button</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#eef2f7, #dde3ea);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  text-align: center;
  max-width: 420px;
}

.title {
  font-size: 20px;
  font-weight: bold;
}

.subtitle {
  font-size: 14px;
  color: #555;
  margin-top: 10px;
}

/* BASE */
.base {
  width: 260px;
  height: 160px;
  background: linear-gradient(#1c1c1c, #000);
  border-radius: 20px;
  box-shadow:
    0 20px 30px rgba(0,0,0,0.4),
    inset 0 4px 8px rgba(255,255,255,0.05);
  position: relative;
  margin: 30px auto;
}

/* BOTÃO */
.button-wrapper {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
}

.button {
  width: 120px;
  height: 120px;
  background: radial-gradient(circle at 30% 30%, #ff6b6b, #c62828);
  border-radius: 50%;
  box-shadow:
    0 12px 0 #7a0000,
    0 20px 20px rgba(0,0,0,0.5);
  transition: all 0.08s;
}

.button.pressed {
  transform: translateY(14px);
  box-shadow:
    0 2px 0 #7a0000,
    0 5px 10px rgba(0,0,0,0.4);
}

/* TAMPA */
.cover {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 140px;

  background: rgba(255,255,255,0.05);
  border: 2px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(8px);

  border-radius: 10px;

  transform-origin: left bottom;
  transition: transform 0.6s ease;
  z-index: 10;
}

.cover.closed {
  transform: rotate(0deg);
  pointer-events: all;
}

.cover.open {
  transform: rotate(-75deg);
  pointer-events: none;
}

/* TEXTO */
#result {
  font-size: 22px;
  margin-top: 15px;
  display: none;
}

.payText {
  margin-top: 10px;
  color: #555;
}

.payBtn {
  margin-top: 20px;
  padding: 10px 18px;
  background: #111;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

  <div class="title">
    Did curiosity kill the cat?
  </div>

  <div class="subtitle">
    Pay $1 to click, and find out how many already did.
  </div>

  <div id="result"></div>

  <div class="base">
    <div id="cover" class="cover closed"></div>

    <div class="button-wrapper">
      <div id="clickBtn" class="button"></div>
    </div>
  </div>

  <button id="payBtn" class="payBtn">Pay here</button>

</div>

<script>
(() => {

const API = "https://stripe-click-backend.onrender.com";

let clicks = 0;
let credits = 0;

const clickBtn = document.getElementById("clickBtn");
const result = document.getElementById("result");
const payBtn = document.getElementById("payBtn");
const cover = document.getElementById("cover");

/* =========================
   AUDIO (VERSÃO QUE FUNCIONA)
========================= */
let audioCtx = null;

async function playSound(url) {
  try {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    const res = await fetch(url);
    const arrayBuffer = await res.arrayBuffer();
    const buffer = await audioCtx.decodeAudioData(arrayBuffer);

    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(audioCtx.destination);
    source.start(0);

  } catch (e) {
    console.log("audio error", e);
  }
}

/* =========================
   UI
========================= */
function render() {
  if (credits > 0) {
    cover.className = "cover open";
  } else {
    cover.className = "cover closed";
  }
}

/* =========================
   STATUS
========================= */
async function refreshStatus() {
  try {
    const res = await fetch(API + "/status");
    const data = await res.json();

    clicks = data.clicks ?? 0;
    credits = data.credits ?? 0;

    render();
  } catch (e) {}
}

/* =========================
   CLICK
========================= */
clickBtn.onclick = async () => {

  if (credits <= 0) {
    playSound("https://assets.mixkit.co/sfx/preview/mixkit-metal-click-1104.mp3");
    return;
  }

  clickBtn.classList.add("pressed");
  setTimeout(() => clickBtn.classList.remove("pressed"), 100);

  playSound("https://assets.mixkit.co/sfx/preview/mixkit-game-click-1114.mp3");

  try {
    const res = await fetch(API + "/click", { method: "POST" });
    const data = await res.json();

    clicks = data.clicks ?? clicks;
    credits = data.credits ?? credits;

    result.style.display = "block";
    result.innerText = clicks + " curious people";

    render();
  } catch (e) {}
};

/* =========================
   STRIPE
========================= */
payBtn.onclick = async () => {
  try {
    const res = await fetch(API + "/create-checkout-session", {
      method: "POST"
    });

    const data = await res.json();

    if (data.url) {
      window.location.href = data.url;
    }

  } catch (e) {
    alert("Failed to connect to server");
  }
};

/* =========================
   RETURN STRIPE
========================= */
const params = new URLSearchParams(window.location.search);

if (params.get("success") === "true") {
  setTimeout(refreshStatus, 1000);
  window.history.replaceState({}, document.title, "/index.html");
}

refreshStatus();

})();
</script>

</body>
</html>
