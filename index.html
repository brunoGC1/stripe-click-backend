<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Click Challenge</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  background: white;
  padding: 40px;
  border-radius: 20px;
  width: 360px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}

h1 {
  margin-bottom: 10px;
}

.lock {
  font-size: 40px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

#clickBtn {
  background: #ff3b3b;
  color: white;
}

#clickBtn.locked {
  opacity: 0.5;
  cursor: not-allowed;
}

#payBtn {
  background: #222;
  color: white;
}

#counter {
  font-size: 40px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="card">

  <div class="lock" id="lock">🔒</div>

  <h1>Click Challenge</h1>

  <p id="text">Pay $1 to unlock clicking</p>

  <button id="clickBtn" class="locked">Locked</button>
  <button id="payBtn">Pay here ($1)</button>

  <div id="counter">0</div>

</div>

<script>
const API = "https://stripe-click-backend.onrender.com";

let unlocked = localStorage.getItem("unlocked") === "true";

const clickBtn = document.getElementById("clickBtn");
const payBtn = document.getElementById("payBtn");
const counter = document.getElementById("counter");
const lock = document.getElementById("lock");
const text = document.getElementById("text");

function render() {
  if (unlocked) {
    lock.style.display = "none";
    text.innerText = "You are unlocked!";
    clickBtn.innerText = "CLICK!";
    clickBtn.classList.remove("locked");
  } else {
    lock.style.display = "block";
    text.innerText = "Pay $1 to unlock clicking";
    clickBtn.innerText = "Locked";
    clickBtn.classList.add("locked");
  }
}

render();

async function loadCounter() {
  const res = await fetch(API + "/click-count");
  const data = await res.json();
  counter.innerText = data.clicks;
}

loadCounter();

payBtn.onclick = async () => {
  const res = await fetch(API + "/create-checkout-session", {
    method: "POST"
  });

  const data = await res.json();
  window.location.href = data.url;
};

clickBtn.onclick = async () => {
  if (!unlocked) return;

  const res = await fetch(API + "/register-click", {
    method: "POST"
  });

  const data = await res.json();
  counter.innerText = data.clicks;
};

async function checkPayment() {
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get("session_id");

  if (localStorage.getItem("unlocked") === "true") {
    unlocked = true;
    render();
    return;
  }

  if (sessionId) {
    const res = await fetch(`${API}/verify-session?session_id=${sessionId}`);
    const data = await res.json();

    if (data.paid) {
      unlocked = true;
      localStorage.setItem("unlocked", "true");
    }

    window.history.replaceState({}, document.title, "/");
  }

  render();
}

checkPayment();
</script>

</body>
</html>
