<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>$1 Million Click Challenge</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    #counter {
      font-size: 28px;
      margin-bottom: 40px;
      font-weight: bold;
    }

    .button-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    #payBtn {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: none;
      background: red;
      color: white;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(255, 0, 0, 0.45);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      position: relative;
    }

    #payBtn:hover {
      transform: scale(1.05);
    }

    #payBtn:active {
      transform: scale(0.98);
    }

    #lock {
      font-size: 60px;
      position: absolute;
      top: 15px;
      right: 15px;
    }

    #actionText {
      font-size: 28px;
      font-weight: bold;
    }

    .success {
      margin-top: 25px;
      font-size: 22px;
      color: #22c55e;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>$1 Million Click Challenge</h1>
    <p id="counter">0 / 1,000,000 clicks</p>

    <div class="button-wrapper">
      <button id="payBtn">
        <span id="lock">🔒</span>
      </button>
      <div id="actionText">Pay here</div>
    </div>

    <div id="message"></div>
  </div>

  <script>
    let clicks = Number(localStorage.getItem('clicks')) || 0;
    let unlocked = false;
    const maxClicks = 1000000;

    const counter = document.getElementById('counter');
    const lock = document.getElementById('lock');
    const actionText = document.getElementById('actionText');
    const message = document.getElementById('message');
    const button = document.getElementById('payBtn');

    function updateCounter() {
      counter.textContent = `${clicks.toLocaleString()} / 1,000,000 clicks`;
    }

    updateCounter();

    const params = new URLSearchParams(window.location.search);

    // voltou do stripe = desbloqueia
    if (params.get('success') === 'true') {
      unlocked = true;
      lock.textContent = '🔓';
      actionText.textContent = 'Click now';
      message.innerHTML = '<div class="success">✅ Payment confirmed! Now press the button.</div>';
    }

    button.addEventListener('click', async () => {
      if (unlocked) {
        if (clicks < maxClicks) {
          clicks++;
          localStorage.setItem('clicks', clicks);
          updateCounter();
          unlocked = false;
          lock.textContent = '🔒';
          actionText.textContent = 'Pay here';
          message.innerHTML = '<div class="success">🎉 Your click was counted!</div>';
          window.history.replaceState({}, document.title, "/");
        }
        return;
      }

      try {
        const response = await fetch('https://stripe-click-backend.onrender.com/create-checkout-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount: 100, currency: 'usd' })
        });

        const data = await response.json();
        window.location.href = data.url;
      } catch (error) {
        alert('Erro ao iniciar pagamento');
      }
    });
  </script>
</body>
</html>
