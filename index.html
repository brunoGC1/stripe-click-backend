<script>
const button = document.getElementById("clickButton");
const counter = document.getElementById("counter");
const lockIcon = document.getElementById("lockIcon");
const payText = document.getElementById("payText");

const API = "https://stripe-click-backend.onrender.com";

// 🔥 FUNÇÃO ÚNICA DE ESTADO
function isUnlocked() {
  return localStorage.getItem("unlocked") === "true";
}

// 🔓 desbloqueio via Stripe (SEM CONFLITO)
const urlParams = new URLSearchParams(window.location.search);

if (urlParams.get("success") === "true") {
  localStorage.setItem("unlocked", "true");

  // limpa URL pra não reprocessar
  window.history.replaceState({}, document.title, "/");
}

// 🎯 aplica UI corretamente (sempre baseado em função única)
function render() {
  if (isUnlocked()) {
    button.classList.remove("locked");
    button.classList.add("unlocked");

    lockIcon.style.display = "none";
    payText.innerText = "Click now!";
  } else {
    button.classList.add("locked");

    lockIcon.style.display = "block";
    payText.innerText = "Pay $1 to unlock";
  }
}

render();

// 🔢 carregar contador
async function loadCounter() {
  const res = await fetch(API + "/click-count");
  const data = await res.json();
  counter.innerText = data.clicks;
}

loadCounter();

// 🔥 clique
button.addEventListener("click", async () => {
  if (!isUnlocked()) {
    const res = await fetch(API + "/create-checkout-session", {
      method: "POST"
    });

    const data = await res.json();
    window.location.href = data.url;
    return;
  }

  const res = await fetch(API + "/register-click", {
    method: "POST"
  });

  const data = await res.json();
  counter.innerText = data.clicks;
});
</script>
