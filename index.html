<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>$1 Click Challenge</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 42px;
    }

    p {
      font-size: 22px;
      margin-bottom: 30px;
    }

    button {
      padding: 25px 40px;
      font-size: 24px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>$1 Million Click Challenge</h1>
    <p id="counter">0 / 1,000,000 clicks</p>
    <button id="payBtn">Pay 1 dollar and click this button</button>
  </div>

  <script>
    let clicks = Number(localStorage.getItem('clicks')) || 0;
    const maxClicks = 1000000;
    const counter = document.getElementById('counter');

    function updateCounter() {
      counter.textContent = `${clicks.toLocaleString()} / 1,000,000 clicks`;
    }

    updateCounter();

    document.getElementById('payBtn').addEventListener('click', async () => {
      if (clicks >= maxClicks) {
        alert('1,000,000 clicks reached!');
        return;
      }

      try {
        const response = await fetch('https://stripe-click-backend.onrender.com/create-checkout-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount: 100, currency: 'usd' })
        });

        const data = await response.json();

        clicks++;
        localStorage.setItem('clicks', clicks);
        updateCounter();

        window.location.href = data.url;
      } catch (error) {
        alert('Erro ao iniciar pagamento');
      }
    });
  </script>
</body>
</html>
