<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Curiosity Button</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#eef2f7, #dde3ea);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  text-align: center;
  max-width: 420px;
}

.title {
  font-size: 20px;
  font-weight: bold;
}

.highlight {
  color: #e53935;
}

.subtitle {
  font-size: 14px;
  color: #555;
  margin-top: 10px;
}

/* BASE */
.base {
  width: 280px;
  height: 160px;
  margin: 40px auto;
  position: relative;

  background: linear-gradient(145deg, #1a1a1a, #000);
  border-radius: 18px;

  box-shadow:
    0 20px 40px rgba(0,0,0,0.5),
    inset 0 3px 6px rgba(255,255,255,0.05),
    inset 0 -4px 10px rgba(0,0,0,0.8);
}

/* BOTÃO */
.button-wrapper {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -45%);
}

.push-button {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  position: relative;

  background: radial-gradient(circle, #ffd700, #b8860b);
  box-shadow:
    inset 0 4px 8px rgba(255,255,255,0.3),
    0 10px 20px rgba(0,0,0,0.5);

  display: flex;
  justify-content: center;
  align-items: center;
}

.push-button::before {
  content: "";
  position: absolute;
  width: 115px;
  height: 115px;
  border-radius: 50%;

  background: radial-gradient(circle, #ddd, #888);
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
}

.top {
  position: absolute;
  width: 100px;
  height: 100px;
  border-radius: 50%;

  background: radial-gradient(circle at 30% 30%, #ff3b3b, #b30000);
  box-shadow:
    0 10px 0 #7a0000,
    0 15px 20px rgba(0,0,0,0.5);

  display: flex;
  justify-content: center;
  align-items: center;

  color: white;
  font-weight: bold;
  font-size: 18px;

  transition: all 0.08s;
}

.top.pressed {
  transform: translateY(12px);
  box-shadow:
    0 2px 0 #7a0000,
    0 5px 10px rgba(0,0,0,0.4);
}

/* TAMPA */
.cover {
  position: absolute;
  top: 0;
  left: 0;

  width: 100%;
  height: 100%;

  border-radius: 18px;

  background: rgba(255,255,255,0.02);
  border: 2px solid rgba(255,255,255,0.15);

  backdrop-filter: blur(2px);

  transform-origin: left bottom;
  transition: transform 0.6s ease;
  z-index: 10;
}

.cover.closed {
  transform: rotate(0deg);
  pointer-events: all;
}

.cover.open {
  transform: rotate(-80deg);
  pointer-events: none;
}

/* RESULT */
#result {
  font-size: 22px;
  margin-top: 15px;
  display: none;
}

.payBtn {
  margin-top: 20px;
  padding: 10px 18px;
  background: #111;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

  <div class="title">
    Can strangers on the internet reach 
    <span class="highlight">ONE MILLION</span> clicks?
  </div>

  <div class="subtitle">
    Pay $1 to click, and find out how many already did.
  </div>

  <div id="result"></div>

  <div class="base">
    <div id="cover" class="cover closed"></div>

    <div class="button-wrapper">
      <div id="clickBtn" class="push-button">
        <div class="top">PUSH</div>
      </div>
    </div>
  </div>

  <button id="payBtn" class="payBtn">Pay here</button>

</div>

<script>
(() => {

const API = "https://stripe-click-backend.onrender.com";

let clicks = 0;
let credits = 0;

const clickBtn = document.getElementById("clickBtn");
const topBtn = clickBtn.querySelector(".top");
const result = document.getElementById("result");
const payBtn = document.getElementById("payBtn");
const cover = document.getElementById("cover");

const GOAL = 1000000;

/* AUDIO */
let audioCtx;

async function playSound(url) {
  try {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    const res = await fetch(url);
    const buffer = await res.arrayBuffer();
    const audioBuffer = await audioCtx.decodeAudioData(buffer);

    const source = audioCtx.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(audioCtx.destination);
    source.start(0);
  } catch {}
}

/* FORMAT NUMBER */
function formatNumber(num) {
  return num.toLocaleString();
}

/* UI */
function render() {
  if (credits > 0) {
    cover.className = "cover open";
  } else {
    cover.className = "cover closed";
  }
}

/* STATUS */
async function refreshStatus() {
  try {
    const res = await fetch(API + "/status");
    const data = await res.json();

    clicks = data.clicks ?? 0;
    credits = data.credits ?? 0;

    render();
  } catch {}
}

/* CLICK */
clickBtn.onclick = async () => {

  if (credits <= 0) {
    playSound("https://assets.mixkit.co/sfx/preview/mixkit-metal-click-1104.mp3");
    return;
  }

  topBtn.classList.add("pressed");
  setTimeout(() => topBtn.classList.remove("pressed"), 100);

  playSound("https://assets.mixkit.co/sfx/preview/mixkit-game-click-1114.mp3");

  try {
    const res = await fetch(API + "/click", { method: "POST" });
    const data = await res.json();

    clicks = data.clicks ?? clicks;
    credits = data.credits ?? credits;

    result.style.display = "block";
    result.innerText = formatNumber(clicks) + " / " + formatNumber(GOAL);

    render();
  } catch {}
};

/* STRIPE */
payBtn.onclick = async () => {
  try {
    const res = await fetch(API + "/create-checkout-session", {
      method: "POST"
    });

    const data = await res.json();

    if (data.url) {
      window.location.href = data.url;
    }

  } catch {
    alert("Failed to connect to server");
  }
};

/* RETURN FIX */
const params = new URLSearchParams(window.location.search);

if (params.get("success") === "true") {
  setTimeout(() => {
    window.location.href = "/index.html?v=" + Date.now();
  }, 500);
}

refreshStatus();

})();
</script>

</body>
</html>
