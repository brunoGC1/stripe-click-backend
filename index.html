<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>$1 Million Click Challenge</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    #counter {
      font-size: 28px;
      margin-bottom: 40px;
      font-weight: bold;
    }

    .button-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

    #mainBtn {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      border: none;
      background: red;
      color: white;
      font-size: 24px;
      font-weight: bold;
      box-shadow: 0 12px 30px rgba(255, 0, 0, 0.45);
      position: relative;
      padding: 30px;
      line-height: 1.3;
      cursor: pointer;
    }

    #lock {
      font-size: 48px;
      position: absolute;
      top: 18px;
      right: 22px;
      transition: transform 0.18s ease;
    }

    #sideAction {
      font-size: 30px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: underline;
      user-select: none;
    }

    .success {
      margin-top: 25px;
      font-size: 22px;
      color: #22c55e;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>$1 Million Click Challenge</h1>
    <p id="counter">0 / 1,000,000 clicks</p>

    <div class="button-wrapper">
      <button id="mainBtn">
        <span id="lock">🔒</span>
        <span id="buttonText">Pay $1 to click the button</span>
      </button>

      <div id="sideAction">Pay here</div>
    </div>

    <div id="message"></div>
  </div>

  <script>
    let clicks = Number(localStorage.getItem('clicks')) || 0;
    let unlocked = false;
    const maxClicks = 1000000;

    const counter = document.getElementById('counter');
    const lock = document.getElementById('lock');
    const sideAction = document.getElementById('sideAction');
    const message = document.getElementById('message');
    const mainBtn = document.getElementById('mainBtn');

    function updateCounter() {
      counter.textContent = `${clicks.toLocaleString()} / 1,000,000 clicks`;
    }

    updateCounter();

    const params = new URLSearchParams(window.location.search);

    // voltou do Stripe = desbloqueia
    if (params.get('success') === 'true') {
      unlocked = true;
      lock.textContent = '🔓';
      sideAction.textContent = 'Click the button';
      message.innerHTML = '<div class="success">✅ Payment confirmed! Now click the red button.</div>';
    }

    // clique no botão vermelho
    mainBtn.addEventListener('click', () => {
      // se estiver bloqueado, só anima o cadeado
      if (!unlocked) {
        lock.style.transform = 'scale(1.25)';
        setTimeout(() => {
          lock.style.transform = 'scale(1)';
        }, 180);
        return;
      }

      if (clicks < maxClicks) {
        clicks++;
        localStorage.setItem('clicks', clicks);
        updateCounter();

        unlocked = false;
        lock.textContent = '🔒';
        sideAction.textContent = 'Pay here';
        message.innerHTML = '<div class="success">🎉 Your click was counted!</div>';

        window.history.replaceState({}, document.title, "/");
      }
    });

    // clique lateral = abre pagamento
    sideAction.addEventListener('click', async () => {
      if (unlocked) return;

      try {
        const response = await fetch('https://stripe-click-backend.onrender.com/create-checkout-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount: 100, currency: 'usd' })
        });

        const data = await response.json();
        window.location.href = data.url;
      } catch (error) {
        alert('Erro ao iniciar pagamento');
      }
    });
  </script>
</body>
</html>
