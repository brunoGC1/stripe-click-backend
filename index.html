<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Click Challenge</title>

<style>
body {
  background: radial-gradient(circle at top, #1a1a1a, #000);
  color: white;
  font-family: Arial;
  text-align: center;
  padding-top: 120px;
}

h1 {
  opacity: 0.9;
}

#clickButton {
  width: 260px;
  height: 260px;
  border-radius: 50%;
  border: none;
  font-size: 18px;
  transition: 0.25s;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin: auto;
}

.locked {
  background: linear-gradient(145deg, #111, #000);
  cursor: pointer;
  box-shadow: 0 0 0 1px #222;
}

.unlocked {
  background: linear-gradient(145deg, #ff3b3b, #b30000);
  cursor: pointer;
  box-shadow: 0 10px 40px rgba(255, 0, 0, 0.3);
  transform: scale(1.05);
}

#counter {
  font-size: 48px;
  margin-top: 50px;
  opacity: 0.8;
}
</style>
</head>

<body>

<h1>Click Challenge</h1>

<button id="clickButton" class="locked">
  🔒 Pay $1 to unlock
</button>

<div id="counter">0</div>

<script>
const API = "https://stripe-click-backend.onrender.com";

const button = document.getElementById("clickButton");
const counter = document.getElementById("counter");

let unlocked = false;

// =========================
// VERIFICAR PAGAMENTO REAL
// =========================
const params = new URLSearchParams(window.location.search);
const sessionId = params.get("session_id");

async function checkPayment() {
  const saved = localStorage.getItem("unlocked") === "true";

  if (saved) {
    unlocked = true;
    render();
    return;
  }

  if (sessionId) {
    const res = await fetch(`${API}/verify-session?session_id=${sessionId}`);
    const data = await res.json();

    if (data.paid) {
      unlocked = true;
      localStorage.setItem("unlocked", "true");
    }

    window.history.replaceState({}, document.title, "/");
  }

  render();
}

function render() {
  if (unlocked) {
    button.classList.remove("locked");
    button.classList.add("unlocked");
    button.innerText = "Click now!";
  } else {
    button.classList.add("locked");
    button.innerText = "🔒 Pay $1 to unlock";
  }
}

// =========================
// CONTADOR
// =========================
async function loadCounter() {
  const res = await fetch(API + "/click-count");
  const data = await res.json();
  counter.innerText = data.clicks;
}

// =========================
// CLICK
// =========================
button.addEventListener("click", async () => {

  if (!unlocked) {
    const res = await fetch(API + "/create-checkout-session", {
      method: "POST"
    });

    const data = await res.json();
    window.location.href = data.url;
    return;
  }

  const res = await fetch(API + "/register-click", {
    method: "POST"
  });

  const data = await res.json();
  counter.innerText = data.clicks;
});

// init
checkPayment();
loadCounter();
render();
</script>

</body>
</html>
