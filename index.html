<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Click Challenge</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #1d2b64, #f8cdda);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

/* CARD */
.card {
  background: white;
  padding: 40px;
  border-radius: 20px;
  width: 360px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}

h1 {
  margin-bottom: 10px;
}

.lock {
  font-size: 40px;
  margin-bottom: 10px;
}

/* BUTTONS */
.btn-click {
  width: 100%;
  padding: 18px;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  margin-top: 15px;
  cursor: pointer;
  transition: 0.2s;
}

.locked {
  background: #ff3b3b;
  color: white;
}

.locked:hover {
  background: #e60000;
}

.unlocked {
  background: #ff3b3b;
  color: white;
  font-weight: bold;
}

.pay-btn {
  margin-top: 10px;
  background: #222;
  color: white;
}

.pay-btn:hover {
  background: #000;
}

/* COUNTER */
#counter {
  font-size: 42px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="card">

  <div id="lockIcon" class="lock">🔒</div>

  <h1>Click Challenge</h1>

  <p id="text">Pay 1 dollar to unlock clicking</p>

  <button id="clickButton" class="btn-click locked">
    Click is locked
  </button>

  <button id="payButton" class="btn-click pay-btn">
    Pay here ($1)
  </button>

  <div id="counter">0</div>

</div>

<script>
const API = "https://stripe-click-backend.onrender.com";

const clickBtn = document.getElementById("clickButton");
const payBtn = document.getElementById("payButton");
const counter = document.getElementById("counter");
const lockIcon = document.getElementById("lockIcon");
const text = document.getElementById("text");

let unlocked = localStorage.getItem("unlocked") === "true";

/* =========================
   RENDER UI
========================= */
function render() {
  if (unlocked) {
    lockIcon.style.display = "none";
    text.innerText = "You are unlocked!";
    clickBtn.innerText = "CLICK ME!";
    clickBtn.classList.remove("locked");
    clickBtn.classList.add("unlocked");
  } else {
    lockIcon.style.display = "block";
    text.innerText = "Pay 1 dollar to unlock clicking";
    clickBtn.innerText = "Click is locked";
    clickBtn.classList.add("locked");
  }
}

render();

/* =========================
   LOAD COUNTER
========================= */
async function loadCounter() {
  const res = await fetch(API + "/click-count");
  const data = await res.json();
  counter.innerText = data.clicks;
}
loadCounter();

/* =========================
   PAY BUTTON
========================= */
payBtn.addEventListener("click", async () => {
  const res = await fetch(API + "/create-checkout-session", {
    method: "POST"
  });

  const data = await res.json();
  window.location.href = data.url;
});

/* =========================
   CLICK BUTTON
========================= */
clickBtn.addEventListener("click", async () => {
  if (!unlocked) return;

  const res = await fetch(API + "/register-click", {
    method: "POST"
  });

  const data = await res.json();
  counter.innerText = data.clicks;
});

/* =========================
   CHECK STRIPE RETURN
========================= */
async function checkPayment() {
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get("session_id");

  if (unlocked) {
    render();
    return;
  }

  if (sessionId) {
    const res = await fetch(`${API}/verify-session?session_id=${sessionId}`);
    const data = await res.json();

    if (data.paid) {
      unlocked = true;
      localStorage.setItem("unlocked", "true");
    }

    window.history.replaceState({}, document.title, "/");
  }

  render();
}

checkPayment();
</script>

</body>
</html>
