<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Click Game</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#eef2f7, #dde3ea);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  text-align: center;
}

/* BASE */
.base {
  width: 260px;
  height: 160px;
  background: linear-gradient(#1c1c1c, #000);
  border-radius: 20px;
  box-shadow:
    0 20px 30px rgba(0,0,0,0.4),
    inset 0 4px 8px rgba(255,255,255,0.05);
  position: relative;
  margin: 30px auto;
}

/* BOTÃO */
.button-wrapper {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
}

.button {
  width: 120px;
  height: 120px;
  background: radial-gradient(circle at 30% 30%, #ff6b6b, #c62828);
  border-radius: 50%;
  box-shadow:
    0 12px 0 #7a0000,
    0 20px 20px rgba(0,0,0,0.5);
  transition: all 0.08s;
}

/* APERTO */
.button.pressed {
  transform: translateY(14px);
  box-shadow:
    0 2px 0 #7a0000,
    0 5px 10px rgba(0,0,0,0.4);
}

/* TAMPA */
.cover {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 140px;

  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.25);
  backdrop-filter: blur(6px);

  border-radius: 10px;

  transform-origin: left bottom;
  transition: transform 0.6s ease;
  z-index: 10;
}

/* ABERTA */
.cover.open {
  transform: rotate(-75deg);
}

/* BLOQUEIO DE CLIQUE */
.cover.closed {
  pointer-events: all;
}

.cover.open {
  pointer-events: none;
}

/* TEXTOS */
#counter {
  font-size: 32px;
}

.small {
  margin-top: 10px;
  color: #555;
}

.payBtn {
  margin-top: 20px;
  padding: 10px 18px;
  background: #111;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

  <h2>Click Game</h2>
  <div id="counter">0</div>

  <div class="base">
    <div id="cover" class="cover closed"></div>

    <div class="button-wrapper">
      <div id="clickBtn" class="button"></div>
    </div>
  </div>

  <div class="small" id="creditsText">Credits: 0</div>
  <button id="payBtn" class="payBtn">Pay here</button>

</div>

<script>
(() => {

const API = "https://stripe-click-backend.onrender.com";

let clicks = 0;
let credits = 0;

const clickBtn = document.getElementById("clickBtn");
const counter = document.getElementById("counter");
const creditsText = document.getElementById("creditsText");
const payBtn = document.getElementById("payBtn");
const cover = document.getElementById("cover");

/* =========================
   SONS (CORRIGIDO)
========================= */
const lockedSound = new Audio();
lockedSound.src = "https://assets.mixkit.co/sfx/preview/mixkit-metal-click-1104.mp3";

const clickSound = new Audio();
clickSound.src = "https://assets.mixkit.co/sfx/preview/mixkit-game-click-1114.mp3";

/* =========================
   UI
========================= */
function render() {
  counter.innerText = clicks;
  creditsText.innerText = "Credits: " + credits;

  if (credits > 0) {
    cover.classList.add("open");
    cover.classList.remove("closed");
  } else {
    cover.classList.remove("open");
    cover.classList.add("closed");
  }
}

/* =========================
   STATUS
========================= */
async function refreshStatus() {
  try {
    const res = await fetch(API + "/status");
    const data = await res.json();

    clicks = data.clicks ?? 0;
    credits = data.credits ?? 0;

    render();
  } catch (e) {
    console.log("status error", e);
  }
}

/* =========================
   CLICK
========================= */
clickBtn.onclick = async () => {

  // se travado, nem tenta clicar
  if (credits <= 0) {
    lockedSound.currentTime = 0;
    lockedSound.play().catch(()=>{});
    return;
  }

  // animação
  clickBtn.classList.add("pressed");
  setTimeout(() => clickBtn.classList.remove("pressed"), 100);

  clickSound.currentTime = 0;
  clickSound.play().catch(()=>{});

  try {
    const res = await fetch(API + "/click", { method: "POST" });
    const data = await res.json();

    clicks = data.clicks ?? clicks;
    credits = data.credits ?? credits;

    render();
  } catch (e) {
    console.log("click error", e);
  }
};

/* =========================
   STRIPE
========================= */
payBtn.onclick = async () => {
  try {
    const res = await fetch(API + "/create-checkout-session", {
      method: "POST"
    });

    const data = await res.json();

    if (data.url) {
      window.location.href = data.url;
    } else {
      alert("Stripe error");
    }

  } catch (e) {
    alert("Failed to connect to server");
  }
};

/* =========================
   RETURN STRIPE
========================= */
const params = new URLSearchParams(window.location.search);

if (params.get("success") === "true") {
  setTimeout(refreshStatus, 1000);
  window.history.replaceState({}, document.title, "/index.html");
}

refreshStatus();

})();
</script>

</body>
</html>
