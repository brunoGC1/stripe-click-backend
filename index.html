<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Click Challenge</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 80px;
    }

    .btn {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      border: none;
      font-size: 18px;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .locked {
      background: red;
    }

    .unlocked {
      background: green;
    }
  </style>
</head>

<body>

<h1>Click Challenge</h1>

<button id="btn" class="btn locked">
🔒 Pay $1 to unlock
</button>

<br><br>

<button onclick="pay()">Pay here</button>

<h3>Clicks: <span id="count">0</span></h3>

<script>
const API = "https://stripe-click-backend.onrender.com";

let paid = false;

const btn = document.getElementById("btn");
const countEl = document.getElementById("count");

// STATUS DO PAGAMENTO
async function checkStatus() {
  const res = await fetch(API + "/status");
  const data = await res.json();

  paid = data.paid;

  if (paid) {
    btn.classList.remove("locked");
    btn.classList.add("unlocked");
    btn.innerText = "🔥 CLICK ME";
  }
}

// CLIQUE
btn.onclick = async () => {
  if (!paid) return alert("Pay first!");

  await fetch(API + "/register-click", { method: "POST" });
  loadClicks();
};

// CONTADOR
async function loadClicks() {
  const res = await fetch(API + "/click-count");
  const data = await res.json();
  countEl.innerText = data.clicks;
}

// PAGAMENTO
async function pay() {
  const res = await fetch(API + "/create-checkout-session", {
    method: "POST"
  });

  const data = await res.json();
  window.location.href = data.url;
}

// INIT
checkStatus();
loadClicks();
setInterval(checkStatus, 3000);
</script>

</body>
</html>
