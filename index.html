<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Click Game</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#eef2f7, #dde3ea);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CONTAINER */
.container {
  text-align: center;
}

/* BASE 3D */
.base {
  width: 260px;
  height: 140px;
  background: linear-gradient(#1c1c1c, #000);
  border-radius: 20px;
  box-shadow:
    0 20px 30px rgba(0,0,0,0.4),
    inset 0 4px 8px rgba(255,255,255,0.05);
  position: relative;
  padding-top: 30px;
}

/* BOTÃO */
.button-wrapper {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
}

.button {
  width: 120px;
  height: 120px;
  background: radial-gradient(circle at 30% 30%, #ff6b6b, #c62828);
  border-radius: 50%;
  box-shadow:
    0 10px 0 #7a0000,
    0 20px 20px rgba(0,0,0,0.5);
  cursor: pointer;
  transition: all 0.1s;
}

.button.pressed {
  transform: translateY(12px);
  box-shadow:
    0 2px 0 #7a0000,
    0 5px 10px rgba(0,0,0,0.4);
}

/* TAMPA ACRÍLICO */
.cover {
  position: absolute;
  top: -80px;
  left: 20px;
  width: 220px;
  height: 140px;
  background: rgba(255,255,255,0.15);
  border: 2px solid rgba(255,255,255,0.4);
  border-radius: 8px;
  backdrop-filter: blur(4px);
  transform-origin: left bottom;
  transition: transform 0.6s ease;
}

/* ABERTA */
.cover.open {
  transform: rotate(-70deg);
}

/* TEXTO */
#counter {
  font-size: 32px;
  margin-bottom: 20px;
}

.small {
  margin-top: 15px;
  color: #555;
}

.payBtn {
  margin-top: 20px;
  padding: 10px 18px;
  background: #111;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

  <h2>Click Game</h2>
  <div id="counter">0</div>

  <div class="base">
    <div id="cover" class="cover"></div>

    <div class="button-wrapper">
      <div id="clickBtn" class="button"></div>
    </div>
  </div>

  <div class="small" id="creditsText">Credits: 0</div>
  <button id="payBtn" class="payBtn">Pay here</button>

</div>

<script>
(() => {

const API = "https://stripe-click-backend.onrender.com";

let clicks = 0;
let credits = 0;

const clickBtn = document.getElementById("clickBtn");
const counter = document.getElementById("counter");
const creditsText = document.getElementById("creditsText");
const payBtn = document.getElementById("payBtn");
const cover = document.getElementById("cover");

/* =========================
   SONS
========================= */
const lockedSound = new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3");
const clickSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");

/* =========================
   UI
========================= */
function render() {
  counter.innerText = clicks;
  creditsText.innerText = "Credits: " + credits;

  if (credits > 0) {
    cover.classList.add("open");
  } else {
    cover.classList.remove("open");
  }
}

/* =========================
   STATUS
========================= */
async function refreshStatus() {
  try {
    const res = await fetch(API + "/status");
    const data = await res.json();

    clicks = data.clicks ?? 0;
    credits = data.credits ?? 0;

    render();
  } catch (e) {
    console.log("status error", e);
  }
}

/* =========================
   CLICK
========================= */
clickBtn.onclick = async () => {

  // animação sempre
  clickBtn.classList.add("pressed");
  setTimeout(() => clickBtn.classList.remove("pressed"), 120);

  if (credits <= 0) {
    lockedSound.currentTime = 0;
    lockedSound.play();
    return;
  }

  clickSound.currentTime = 0;
  clickSound.play();

  try {
    const res = await fetch(API + "/click", { method: "POST" });
    const data = await res.json();

    clicks = data.clicks ?? clicks;
    credits = data.credits ?? credits;

    render();
  } catch (e) {
    console.log("click error", e);
  }
};

/* =========================
   STRIPE
========================= */
payBtn.onclick = async () => {
  try {
    const res = await fetch(API + "/create-checkout-session", {
      method: "POST"
    });

    const data = await res.json();

    if (data.url) {
      window.location.href = data.url;
    } else {
      alert("Stripe error");
    }

  } catch (e) {
    alert("Failed to connect to server");
  }
};

/* =========================
   RETURN STRIPE
========================= */
const params = new URLSearchParams(window.location.search);

if (params.get("success") === "true") {
  setTimeout(refreshStatus, 800); // delay leve pra webhook chegar
  window.history.replaceState({}, document.title, "/index.html");
}

refreshStatus();

})();
</script>

</body>
</html>
