<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Click Challenge</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 80px;
      background: #f5f5f5;
    }

    .btn {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      border: none;
      font-size: 18px;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .locked {
      background: #b00020;
    }

    .unlocked {
      background: #1e88e5;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .small {
      margin-top: 20px;
      font-size: 16px;
    }

    .pay-btn {
      margin-top: 20px;
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>Click Challenge</h1>

  <button id="clickBtn" class="btn locked">
    🔒 Pay $1 to unlock
  </button>

  <div class="small">
    Clicks: <span id="count">0</span>
  </div>

  <button class="pay-btn" onclick="pay()">
    Pay here
  </button>

  <script>
    let paid = false;

    const API = "https://stripe-click-backend.onrender.com";

    const btn = document.getElementById("clickBtn");
    const countEl = document.getElementById("count");

    // =========================
    // CHECK PAYMENT STATUS
    // =========================
    async function checkStatus() {
      const res = await fetch(API + "/status");
      const data = await res.json();

      paid = data.paid;

      if (paid) {
        btn.classList.remove("locked");
        btn.classList.add("unlocked");
        btn.innerText = "🔥 CLICK ME";
      } else {
        btn.classList.add("locked");
        btn.innerText = "🔒 Pay $1 to unlock";
      }
    }

    // =========================
    // CLICK ACTION
    // =========================
    btn.onclick = async () => {
      if (!paid) {
        alert("You must pay first.");
        return;
      }

      await fetch(API + "/register-click", { method: "POST" });
      loadClicks();
    };

    // =========================
    // LOAD COUNTER
    // =========================
    async function loadClicks() {
      const res = await fetch(API + "/click-count");
      const data = await res.json();
      countEl.innerText = data.clicks;
    }

    // =========================
    // STRIPE PAYMENT
    // =========================
    async function pay() {
      const res = await fetch(API + "/create-checkout-session", {
        method: "POST"
      });

      const data = await res.json();
      window.location.href = data.url;
    }

    // =========================
    // INIT
    // =========================
    checkStatus();
    loadClicks();

    // refresh status every 3 seconds
    setInterval(checkStatus, 3000);
  </script>

</body>
</html>
